name: Sarvagun and SuperTuriya CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile backend
        run: python -m compileall -q app
      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Type-check and build frontend
        run: npm run build

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config
      - name: Build and start the complete judge stack
        run: docker compose up --build --detach
      - name: Verify frontend and proxied backend health
        run: |
          for attempt in {1..45}; do
            if curl --fail --silent http://localhost:5173/ >/dev/null \
              && curl --fail --silent http://localhost:5173/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Stop judge stack
        if: always()
        run: docker compose down --volumes
